<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bruno Web Recorder</title>
  <style>
    :root { color-scheme: light dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    body { margin: 0; width: 340px; padding: 16px; background: #16181d; color: #f3f4f6; }
    h1 { margin: 0 0 4px; font-size: 16px; }
    p { margin: 0 0 14px; color: #aeb4c0; font-size: 12px; line-height: 1.45; }
    label { display: block; margin-top: 10px; font-size: 11px; color: #aeb4c0; }
    input { box-sizing: border-box; width: 100%; margin-top: 5px; border: 1px solid #393e49; border-radius: 7px; background: #20232a; color: #fff; padding: 8px 10px; font: inherit; }
    .row { display: grid; grid-template-columns: 90px 1fr; gap: 8px; }
    .buttons { display: flex; gap: 8px; margin-top: 14px; }
    button { flex: 1; border: 0; border-radius: 7px; padding: 9px 10px; font-weight: 650; cursor: pointer; }
    #start { background: #f97316; color: white; }
    #stop { background: #343945; color: white; }
    button:disabled { opacity: .45; cursor: default; }
    #status { margin-top: 12px; min-height: 18px; border-radius: 7px; padding: 8px 10px; background: #20232a; color: #c5cad4; font-size: 11px; word-break: break-word; }
    #status.error { color: #fca5a5; }
    #status.ok { color: #86efac; }
  </style>
</head>
<body>
  <h1>Bruno Web Recorder</h1>
  <p>Start a session in Bruno, then attach this recorder to the current tab.</p>
  <div class="row">
    <label>Port<input id="port" type="number" min="1" max="65535" value="6174" /></label>
    <label>Pairing token<input id="token" type="password" autocomplete="off" placeholder="Paste from Bruno" /></label>
  </div>
  <div class="buttons">
    <button id="start">Attach & Record</button>
    <button id="stop">Stop</button>
  </div>
  <div id="status">Not connected</div>
  <script src="popup.js"></script>
</body>
</html>
